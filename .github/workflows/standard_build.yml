name: C/C++ CI

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: clone supercollider
      run: git clone -b 3.14 --recurse-submodules https://github.com/supercollider/supercollider.git
    - name: make build dir
      run: mkdir build
    - name: cmake configure
      run: cmake -DSUPERNOVA=ON -DSC_PATH="./supercollider" -DCMAKE_BUILD_TYPE=Release ..
    - name: make
      run: make
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck
